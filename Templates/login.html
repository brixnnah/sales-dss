<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login — Supermarket DSS</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="bg-blob1"></div>
  <div class="bg-blob2"></div>

  <div style="min-height:100vh; display:flex; align-items:center; justify-content:center; position:relative; z-index:1;">
    <div style="width:100%; max-width:420px;">

      <!-- Logo / brand -->
      <div style="text-align:center; margin-bottom:32px;">
        <div style="width:56px; height:56px; background:linear-gradient(135deg,var(--accent),var(--accent2));
                    border-radius:16px; display:inline-flex; align-items:center; justify-content:center;
                    font-size:28px; margin-bottom:16px;">📊</div>
        <div style="font-family:var(--font-display); font-size:28px; font-weight:800;
                    color:var(--text); letter-spacing:-0.5px;">Supermarket DSS</div>
        <div style="font-size:14px; color:var(--text3); margin-top:4px;">
          Sales Forecasting &amp; Inventory Optimization
        </div>
      </div>

      <!-- Card -->
      <div class="card" style="padding:36px;">
        <div style="font-family:var(--font-display); font-size:20px; font-weight:700;
                    color:var(--text); margin-bottom:6px;">Sign in</div>
        <div style="font-size:13px; color:var(--text3); margin-bottom:28px;">
          Enter your credentials to access the dashboard.
        </div>

        {% if error %}
          <div style="background:rgba(255,45,144,0.08); border:1px solid rgba(255,45,144,0.25);
                      border-radius:var(--radius-sm); padding:12px 16px; margin-bottom:20px;
                      font-size:13px; color:#c0185e; display:flex; align-items:center; gap:8px;">
            <span>⚠️</span> {{ error }}
          </div>
        {% endif %}

        <form method="post" autocomplete="off" style="display:flex; flex-direction:column; gap:18px;">
          <div class="field">
            <label style="font-size:13px; font-weight:600; color:var(--text2); margin-bottom:6px; display:block;">
              Username
            </label>
            <input
              type="text" name="username" required autofocus
              placeholder="e.g. manager"
              style="width:100%; padding:10px 14px; border-radius:var(--radius-sm);
                     border:1px solid var(--border2); background:var(--surface2);
                     color:var(--text); font-family:var(--font-body); font-size:14px; outline:none;"
            />
          </div>

          <div class="field">
            <label style="font-size:13px; font-weight:600; color:var(--text2); margin-bottom:6px; display:block;">
              Password
            </label>
            <input
              type="password" name="password" required
              placeholder="Enter password"
              style="width:100%; padding:10px 14px; border-radius:var(--radius-sm);
                     border:1px solid var(--border2); background:var(--surface2);
                     color:var(--text); font-family:var(--font-body); font-size:14px; outline:none;"
            />
          </div>

          <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center; padding:12px; font-size:15px; margin-top:4px;">
            Sign In
          </button>
        </form>

        <!-- Demo credentials hint -->
        <div style="margin-top:24px; padding:14px; background:var(--surface2);
                    border-radius:var(--radius-sm); border:1px solid var(--border);
                    font-size:12px; color:var(--text3); line-height:1.7;">
          <strong style="color:var(--text2);">Demo credentials</strong><br>
          admin / admin123 &nbsp;|&nbsp; manager / manager123
        </div>
      </div>

    </div>
  </div>
</body>
</html>
